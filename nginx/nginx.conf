# Nginx reverse proxy: TLS termination + rate limiting (PRD §5).
# Prometheus scrapes the API directly on the internal Docker network, so
# /metrics is intentionally NOT exposed through this public proxy.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Images can be several MB (base64 inflates ~33%); allow generous bodies
    # but cap them so a single request can't exhaust the worker.
    client_max_body_size 15m;

    # Rate limit sized for the ~10 req/sec worst-case burst (PRD §2 Throughput)
    # with burst headroom for the two daily clock-in spikes.
    limit_req_zone $binary_remote_addr zone=compare:10m rate=20r/s;

    # GLOBAL concurrency cap (backpressure). The backend completes ~2 compares/s
    # and each worker handles one at a time, so an unbounded burst would queue
    # past the 30s timeout. Capping total in-flight here — at the proxy, where
    # every request is visible — is fair across all 10 workers by construction,
    # unlike a per-worker app-level cap which the uneven shared-socket accept
    # makes lopsided. $server_name is constant, so this is one global counter.
    # 40 in-flight drains in ~20s worst case (< the 30s read timeout); excess is
    # shed immediately as 503 so the caller can back off and retry.
    limit_conn_zone $server_name zone=backend_conn:10m;

    upstream api {
        # least_conn balances across upstream SERVERS — a no-op with the single
        # backend today, but the correct policy once the api service scales to
        # multiple replicas (on separate hosts; replicas on THIS host only split
        # the same CPU cores). Harmless to keep now, documents intent.
        least_conn;
        server api:8000 max_fails=3 fail_timeout=10s;

        # Pool of reused connections to the backend. The pool (>= the 10 gunicorn
        # workers) is established across workers via the kernel's accept, so
        # multiplexing requests over it spreads them across workers instead of
        # pinning a burst onto one. Recycling each connection after
        # keepalive_requests keeps any single worker from staying permanently
        # hot. This even distribution is what makes the per-worker load-shed
        # (MAX_CONCURRENT_REQUESTS) trigger fairly rather than dumping a whole
        # burst onto one connection's worker.
        keepalive 32;
        keepalive_requests 200;
        keepalive_timeout 60s;
    }

    # Redirect plain HTTP to HTTPS.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Compare endpoints (and the /v3 alias).
        location ~ ^/(facepp/v3|v3)/compare$ {
            limit_req zone=compare burst=40 nodelay;
            # Global in-flight cap -> fast 503 when the backend is saturated.
            limit_conn backend_conn 40;
            limit_conn_status 503;

            proxy_pass http://api;
            # HTTP/1.1 + an empty Connection header are REQUIRED for the upstream
            # keepalive pool to take effect. Without them nginx sends
            # "Connection: close" and reopens a backend connection per request,
            # which is what concentrated bursts onto a few workers.
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;

            # Retry another pooled connection only on a genuine connection
            # failure — never on a valid HTTP response. The 403
            # CONCURRENCY_LIMIT_EXCEEDED shed is a real answer the caller must
            # back off + retry on, so it is deliberately NOT retried here.
            proxy_next_upstream error timeout;
        }

        location /health {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Block external access to metrics; Prometheus uses the internal network.
        location /metrics {
            return 403;
        }
    }
}
