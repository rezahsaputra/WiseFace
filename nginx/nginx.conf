# Nginx reverse proxy: TLS termination + rate limiting (PRD §5).
# Prometheus scrapes the API directly on the internal Docker network, so
# /metrics is intentionally NOT exposed through this public proxy.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Images can be several MB (base64 inflates ~33%); allow generous bodies
    # but cap them so a single request can't exhaust the worker.
    client_max_body_size 15m;

    # Rate limit sized for the ~10 req/sec worst-case burst (PRD §2 Throughput)
    # with burst headroom for the two daily clock-in spikes.
    limit_req_zone $binary_remote_addr zone=compare:10m rate=20r/s;

    upstream api {
        server api:8000;
        keepalive 32;
    }

    # Redirect plain HTTP to HTTPS.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Compare endpoints (and the /v3 alias).
        location ~ ^/(facepp/v3|v3)/compare$ {
            limit_req zone=compare burst=40 nodelay;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://api;
            access_log off;
        }

        # Block external access to metrics; Prometheus uses the internal network.
        location /metrics {
            return 403;
        }
    }
}
