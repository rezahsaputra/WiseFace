# Single-host deployment (PRD §5). RAM is the binding constraint, so every
# container has an explicit mem_limit (PRD §9.4) to stop one container from
# crowding Windows/WSL2 off RAM. Pin image versions — no `latest` (PRD §9.7).

services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: face-compare-api:1.0.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GUNICORN_WORKERS: "10"
      PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus_multiproc"
      # Burst hardening (see app/config.py). One compare at a time per worker —
      # the OpenCV detector is not thread-safe. Backpressure is handled GLOBALLY
      # by nginx (limit_conn), which is fair across workers; the app's per-worker
      # shed stays disabled (0) as a backstop only. Downscale large inputs before
      # detection to cut per-compare CPU.
      INFERENCE_CONCURRENCY: "1"
      MAX_CONCURRENT_REQUESTS: "0"
      MAX_IMAGE_DIM: "1024"
    volumes:
      # Cache model weights so they aren't re-downloaded on restart (PRD §9.7).
      - deepface_weights:/home/app/.deepface
    # ~7 GB cap for the 10-worker API container (PRD §5 / §9.4).
    mem_limit: 7g
    mem_reservation: 5g
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    networks:
      - facenet

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    mem_limit: 128m
    networks:
      - facenet

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    mem_limit: 512m
    expose:
      - "9090"
    networks:
      - facenet

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    depends_on:
      - prometheus
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    mem_limit: 512m
    ports:
      - "3000:3000"
    networks:
      - facenet

  # Stakeholder demo UI (Streamlit). Opt-in: not started by default.
  #   docker compose --profile demo up -d api demo
  # then open http://localhost:8501
  demo:
    build:
      context: ./demo
      dockerfile: Dockerfile
    image: face-compare-demo:1.0.0
    profiles: ["demo"]
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Hit the API directly on the internal network (no TLS) for a simple demo.
      API_URL: "http://api:8000/facepp/v3/compare"
      API_KEY: "attendance-key"
      API_SECRET: "attendance-secret"
      SAMPLE_DIR: "/app/samples"
      SAMPLE_A: "face1.jpg"
      SAMPLE_B: "face2.jpg"
    volumes:
      # Mount the bundled test faces so the "Gunakan contoh wajah" option works.
      - ./testdata:/app/samples:ro
      # Mount the docs folder so the burst-test report page can read the HTML.
      - ./docs:/app/report:ro
    ports:
      - "8501:8501"
    mem_limit: 512m
    networks:
      - facenet

volumes:
  deepface_weights:
  prometheus_data:
  grafana_data:

networks:
  facenet:
    driver: bridge
